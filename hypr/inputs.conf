#############
### INPUT ###
#############

input {
    kb_layout = fr

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}
gesture = 3, horizontal, workspace # to switch workspaces

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
